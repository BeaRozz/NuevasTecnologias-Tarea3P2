name: Deploy Static Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          
      # Truco DevOps: Generar contenido estático en "el aire"
      - name: Generate static content on-the-fly
        run: |
          mkdir temp_static
          echo "<html><body style='font-family:sans-serif; text-align:center; padding-top:100px;'><h1>Static Web App Active</h1><p>Deploy ID: ${{ github.run_id }}</p><p>🐮🦐💖🐻</p></body></html>" > temp_static/index.html

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "temp_static" # Carpeta generada dinámicamente
          api_location: ""
          output_location: "" 
          skip_app_build: true 
          production_branch: "main"
