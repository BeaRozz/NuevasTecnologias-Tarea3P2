name: Deploy Static Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "app" # Usar la carpeta del proyecto
          api_location: ""
          output_location: "." # Los archivos estáticos (index.html) se generarán aquí mismo
          # Ya no necesitamos el 'skip_app_build' porque ahora sí hay un comando 'npm run build' funcional
